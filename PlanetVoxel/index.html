<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Voxel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
canvas { display: block; }
#ui-root { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
#crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
#money-display { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: bold; color: #FFD700; text-shadow: 0 0 10px #FFD700; pointer-events: none; }
#money-delta { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); font-size: 16px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#fuel-bar { position: absolute; bottom: 50px; left: 20px; width: 120px; }
#fuel-bar-label { font-size: 11px; color: #88aaff; margin-bottom: 4px; }
#fuel-bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; border: 1px solid rgba(136,170,255,0.4); }
#fuel-bar-fill { background: linear-gradient(90deg, #4466ff, #88aaff); height: 100%; border-radius: 4px; transition: width 0.1s; }
#altitude-display { position: absolute; bottom: 20px; left: 20px; font-size: 11px; color: #888; pointer-events: none; }
#demand-alert { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(255,100,0,0.85); border: 1px solid #ff6400; padding: 8px 16px; border-radius: 6px; font-size: 14px; display: none; pointer-events: none; }
#placement-hint { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); border: 1px solid rgba(136,170,255,0.4); padding: 6px 14px; border-radius: 4px; font-size: 12px; color: #aaccff; pointer-events: none; white-space: nowrap; display: none; z-index: 30; }
#minimap-frame { position: absolute; top: 16px; left: 16px; width: 180px; height: 180px; max-width: calc(100vw - 32px); max-height: calc(100vh - 32px); border: 2px solid rgba(136,170,255,0.5); border-radius: 6px; box-shadow: 0 0 12px rgba(0,0,0,0.5); pointer-events: none; z-index: 5; overflow: hidden; }
#minimap-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.minimap-pole { position: absolute; width: 10px; height: 10px; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid rgba(0,0,0,0.5); }
.minimap-pole.north { background: #4488ff; }
.minimap-pole.south { background: #ff5544; }
#panels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }
.panel { position: absolute; background: rgba(10,12,20,0.95); border: 1px solid rgba(100,150,255,0.3); border-radius: 8px; padding: 16px; min-width: 280px; max-height: 80vh; overflow-y: auto; pointer-events: all; display: none; }
.panel h2 { font-size: 14px; color: #88aaff; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(100,150,255,0.2); padding-bottom: 8px; }
.panel-close { float: right; cursor: pointer; color: #666; font-size: 16px; line-height: 1; }
.panel-close:hover { color: #fff; }
#inventory-panel { top: 60px; left: 20px; }
#market-panel { top: 60px; right: 20px; width: 360px; }
#tech-panel { top: 60px; left: 50%; transform: translateX(-50%); width: 420px; }
#factory-panel { bottom: 20px; right: 20px; width: 360px; max-height: 50vh; }
#build-menu { bottom: 20px; left: 50%; transform: translateX(-50%); width: 500px; }
#building-panel { top: 60px; right: 20px; width: 320px; }
.toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: all; z-index: 20; }
.toolbar-btn { background: rgba(10,12,20,0.9); border: 1px solid rgba(100,150,255,0.3); color: #aac; padding: 8px 14px; font-size: 12px; font-family: 'Courier New', monospace; cursor: pointer; border-radius: 4px; transition: all 0.15s; letter-spacing: 1px; }
.toolbar-btn:hover, .toolbar-btn.active { background: rgba(40,60,120,0.9); border-color: #88aaff; color: #fff; }
.item-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.item-color { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; }
.item-name { flex: 1; }
.item-count { color: #88aaff; font-weight: bold; }
.item-price { color: #FFD700; font-size: 12px; }
.sell-btn { background: rgba(0,180,80,0.2); border: 1px solid rgba(0,180,80,0.5); color: #0c6; padding: 3px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; font-family: 'Courier New', monospace; }
.sell-btn:hover { background: rgba(0,180,80,0.4); }
.price-history { width: 100%; height: 40px; margin-top: 4px; }
.tech-node { padding: 8px 12px; margin-bottom: 8px; border: 1px solid rgba(100,150,255,0.2); border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.tech-node.unlocked { border-color: rgba(0,200,100,0.4); background: rgba(0,200,100,0.05); }
.tech-node.available { border-color: rgba(255,200,0,0.4); background: rgba(255,200,0,0.05); }
.tech-node.locked { opacity: 0.4; cursor: default; }
.tech-node-name { font-size: 13px; font-weight: bold; }
.tech-node-cost { font-size: 11px; color: #FFD700; }
.tech-node-desc { font-size: 11px; color: #888; margin-top: 2px; }
.build-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.build-btn { background: rgba(20,30,60,0.9); border: 1px solid rgba(100,150,255,0.2); padding: 10px 6px; text-align: center; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
.build-btn:hover { border-color: #88aaff; background: rgba(40,60,120,0.9); }
.build-btn.selected { border-color: #FFD700; background: rgba(80,70,0,0.5); }
.build-btn-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.build-btn-name { font-size: 10px; color: #aac; display: block; }
.build-btn-cost { font-size: 10px; color: #FFD700; display: block; }
.building-status { font-size: 11px; padding: 2px 6px; border-radius: 2px; }
.status-running { background: rgba(0,200,100,0.2); color: #0c6; }
.status-starved { background: rgba(255,150,0,0.2); color: #fa0; }
.status-blocked { background: rgba(255,50,50,0.2); color: #f44; }
.status-unpowered { background: rgba(100,100,100,0.2); color: #888; }
#loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
#loading-screen h1 { font-size: 48px; color: #88aaff; text-shadow: 0 0 20px #4466ff; margin-bottom: 20px; letter-spacing: 4px; }
#loading-bar-bg { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
#loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4466ff, #88aaff); border-radius: 2px; transition: width 0.3s; }
#loading-text { margin-top: 12px; font-size: 13px; color: #666; }
#seed-display { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: #333; pointer-events: none; }
#hotbar { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: none; }
.hotbar-slot { background: rgba(10,12,20,0.85); border: 1px solid rgba(100,150,255,0.3); border-radius: 4px; padding: 4px 10px; text-align: center; min-width: 48px; transition: all 0.15s; }
.hotbar-slot.active { border-color: #88aaff; background: rgba(40,60,120,0.9); box-shadow: 0 0 8px rgba(136,170,255,0.5); }
.hotbar-key { font-size: 10px; color: #666; }
.hotbar-slot.active .hotbar-key { color: #88aaff; }
.hotbar-icon { font-size: 18px; line-height: 1.2; }
.hotbar-name { font-size: 9px; color: #aac; letter-spacing: 1px; text-transform: uppercase; }

/* Main menu */
#main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1100; }
#main-menu h1 { font-size: 48px; color: #88aaff; text-shadow: 0 0 20px #4466ff; margin-bottom: 32px; letter-spacing: 4px; }
#menu-panel { width: 420px; max-height: 60vh; display: flex; flex-direction: column; gap: 16px; }
#world-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
.world-row { display: flex; align-items: center; justify-content: space-between; background: rgba(20,30,60,0.7); border: 1px solid rgba(100,150,255,0.25); border-radius: 6px; padding: 10px 14px; cursor: pointer; transition: all 0.15s; }
.world-row:hover { border-color: #88aaff; background: rgba(40,60,120,0.7); }
.world-row-info { display: flex; flex-direction: column; }
.world-row-name { font-size: 14px; color: #fff; }
.world-row-meta { font-size: 11px; color: #777; margin-top: 2px; }
.world-row-delete { color: #f66; font-size: 16px; padding: 4px 8px; border-radius: 4px; }
.world-row-delete:hover { background: rgba(255,60,60,0.2); }
#new-world-form { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(100,150,255,0.2); padding-top: 16px; }
#new-world-form input { background: rgba(255,255,255,0.05); border: 1px solid rgba(100,150,255,0.3); color: #fff; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 4px; }
#new-world-form label { font-size: 11px; color: #88aaff; letter-spacing: 1px; text-transform: uppercase; }
#new-world-btn { background: rgba(40,60,120,0.9); border: 1px solid #88aaff; color: #fff; padding: 10px; font-family: 'Courier New', monospace; font-size: 13px; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
#new-world-btn:hover { background: rgba(60,90,180,0.9); }
#menu-empty-msg { font-size: 12px; color: #555; text-align: center; padding: 12px 0; }

/* In-game menu / save indicator */
#save-indicator { position: absolute; top: 16px; right: 16px; font-size: 11px; color: #6f6; opacity: 0; transition: opacity 0.4s; pointer-events: none; }
#pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 900; pointer-events: all; }
#pause-menu-panel { background: rgba(10,12,20,0.97); border: 1px solid rgba(100,150,255,0.3); border-radius: 8px; padding: 24px 32px; display: flex; flex-direction: column; gap: 12px; min-width: 240px; }
#pause-menu-panel h2 { font-size: 16px; color: #88aaff; letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
.pause-btn { background: rgba(40,60,120,0.9); border: 1px solid #88aaff; color: #fff; padding: 10px; font-family: 'Courier New', monospace; font-size: 13px; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
.pause-btn:hover { background: rgba(60,90,180,0.9); }
</style>
</head>
<body>
<div id="main-menu">
  <h1>PLANET VOXEL</h1>
  <div id="menu-panel">
    <div id="world-list"></div>
    <div id="menu-empty-msg" style="display:none">No worlds yet — create one below.</div>
    <div id="new-world-form">
      <label for="new-world-name">World Name</label>
      <input id="new-world-name" type="text" placeholder="My Planet" maxlength="32">
      <label for="new-world-seed">Seed (optional)</label>
      <input id="new-world-seed" type="text" placeholder="Random" maxlength="16">
      <button id="new-world-btn">Create World</button>
    </div>
  </div>
</div>
<div id="loading-screen" style="display:none">
  <h1>PLANET VOXEL</h1>
  <div id="loading-bar-bg"><div id="loading-bar-fill"></div></div>
  <div id="loading-text">Initializing...</div>
</div>
<div id="ui-root" style="display:none">
  <div id="hud">
    <div id="crosshair"></div>
    <div id="money-display">$0</div>
    <div id="money-delta"></div>
    <div id="fuel-bar">
      <div id="fuel-bar-label">JETPACK</div>
      <div id="fuel-bar-bg"><div id="fuel-bar-fill" style="width:100%"></div></div>
    </div>
    <div id="altitude-display"></div>
    <div id="demand-alert"></div>
    <div id="hotbar"></div>
    <div id="seed-display"></div>
    <div id="save-indicator">SAVED</div>
  </div>
  <div id="placement-hint"></div>
  <div id="minimap-frame">
    <div id="minimap-overlay">
      <div class="minimap-pole north" id="minimap-pole-north"></div>
      <div class="minimap-pole south" id="minimap-pole-south"></div>
    </div>
  </div>
  <div id="pause-menu">
    <div id="pause-menu-panel">
      <h2>Paused</h2>
      <button class="pause-btn" id="pause-resume-btn">Resume</button>
      <button class="pause-btn" id="pause-save-btn">Save Game</button>
      <button class="pause-btn" id="pause-menu-btn">Save &amp; Quit to Menu</button>
    </div>
  </div>
  <div id="panels">
    <div id="inventory-panel" class="panel">
      <span class="panel-close" data-panel="inventory-panel">✕</span>
      <h2>Inventory</h2>
      <div id="inventory-list"></div>
    </div>
    <div id="market-panel" class="panel">
      <span class="panel-close" data-panel="market-panel">✕</span>
      <h2>Market Terminal</h2>
      <div id="market-list"></div>
    </div>
    <div id="tech-panel" class="panel">
      <span class="panel-close" data-panel="tech-panel">✕</span>
      <h2>Tech Tree</h2>
      <div id="tech-list"></div>
    </div>
    <div id="factory-panel" class="panel">
      <span class="panel-close" data-panel="factory-panel">✕</span>
      <h2>Factory Status</h2>
      <div id="factory-list"></div>
    </div>
    <div id="build-menu" class="panel">
      <span class="panel-close" data-panel="build-menu">✕</span>
      <h2>Build Menu</h2>
      <div class="build-grid" id="build-grid"></div>
    </div>
    <div id="building-panel" class="panel">
      <span class="panel-close" id="building-panel-close">✕</span>
      <div id="building-panel-content"></div>
    </div>
  </div>
  <div class="toolbar">
    <button class="toolbar-btn" data-panel="inventory-panel">[I] Inventory</button>
    <button class="toolbar-btn" data-panel="market-panel">[M] Market</button>
    <button class="toolbar-btn" data-panel="tech-panel">[T] Tech Tree</button>
    <button class="toolbar-btn" data-panel="factory-panel">[F] Factory</button>
    <button class="toolbar-btn" data-panel="build-menu">[B] Build</button>
  </div>
</div>
<script>
  // The game now uses the local webgpu.js engine (no CDN dependency), so the
  // old Three.js-caching service worker is obsolete. Proactively unregister any
  // SW left over from a previous version and clear its caches, so stale cached
  // modules can't be served instead of the current local files.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      for (const reg of regs) reg.unregister();
    });
    if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  }
</script>
<script type="module" src="main.js"></script>
</body>
</html>
